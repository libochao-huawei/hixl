# Hixl代码检视重点配置

# focus    = 检视维度关键词，用逗号分隔
# priority = 最高优先级检查项，用逗号分隔
# notes    = 该仓库的领域背景说明，辅助检视策略
focus    = thread-safety,error-propagation,api-abi,lifecycle,async-transfer,cluster-topology,platform-compatibility,docs
priority = 设备内存对齐申请释放，多线程并发竞态，通信资源申请释放，公共API/ABI兼容性，生命周期与状态机闭合，注册内存与异步传输语义，文档同步更新
notes    = Hixl 是昇腾单边通信库，面向集群场景提供简单、可靠、高效的点对点数据传输能力，同时包含 HIXL Engine、LLM-DataDist、HIXL_CS 的 C++/C/Python 接口。 \
           该仓库覆盖 RDMA/HCCS/RoCE/UB/FabricMem 等链路与 A2/A3/950 等多种产品形态。 \
           因此检视时不仅要关注资源泄漏、内存问题、并发问题和时序问题，还要重点排查 ABI 稳定性、建链状态闭合、、平台支持矩阵以及文档正确性。

# 重点检查清单
checks.thread      = 多线程 Malloc 是否使用线程安全接口; aclError 是否在调用栈上传播
checks.abi         = 公开头文件中的函数签名、默认参数、错误码数值、枚举取值、结构体字段顺序以及 reserved 扩展位是否破坏兼容; \
                     C++ API、C API、Python API 是否同步演进
checks.lifecycle   = Initialize/Finalize, Connect/Disconnect, Link/Unlink, Register/Deregister, SetRole 等调用链是否状态闭合; \
                     失败、重复调用、超时、中断路径是否存在悬空句柄、重复释放或资源泄漏
checks.registration = MemDesc、Cache、CommMem 的地址、长度、对齐、Host/Device 类型是否校验完整; \
                      传输中解注册/释放内存、重复注册、地址重叠等场景是否有明确保护
checks.async       = TransferAsync/GetTransferStatus, BatchPutAsync/BatchGetAsync, QueryCompleteStatus 的完成态是否单调且一致; \
                     超时、断链、Finalize 时的 in-flight 请求是否安全收敛
checks.topology    = IPv4/IPv6、listen 信息、cluster/rank、local_ip_infos/remote_ip_infos、endpoint 描述是否合法; \
                     空配置、重复 cluster id、乱序 rank、缺失 local comm res 等场景是否严格报错
checks.platform    = A2/A3/950PR/950DT、RDMA/HCCS/RoCE/UB/FabricMem 等支持矩阵是否被意外放开或收窄; \
                     不支持场景是否明确返回错误而非静默降级
checks.docs        = 脚本如参说明、接口文档和相关README说明是否同步更新
checks.acl         = ACL接口若不满足以下检查项, PR提示接口定义不符合规范:\
                    1.接口统一以acl为前缀\
                    2.接口命名采用“前缀+[对象]+操作动词+[宾语]”的命名结构，不能有单词错误\
                    3.应采用直观的命名与领域建模，使用用户熟悉的语言、词汇和概念，而不是自身系统内部技术实现的术语，方便查找和理解\
                    4.不能使用不常见的缩略语，杜绝完全不规范的缩写，避免望文不知义\
                    5.接口应是对称操作： 创建/销毁、申请/释放、打开/关闭等操作应成对出现\
                    6.枚举不允许定义包含MAX, END, BOTTOM表示边界的枚举项\
                    7.检查接口说明，必须包括接口功能描述，入参说明，出参说明和必要的返回码。其中参数名说明须与接口函数原型定义一致\
                    8.检查对已有枚举或结构体修改时，被修改的枚举或结构体有影响的接口都要有相应的修改处理\
