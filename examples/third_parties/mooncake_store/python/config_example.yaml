# 分布式配置
distributed:
  enabled: true         # 是否启用分布式模式
  world_size: 4         # 总节点数/卡数
  master_addr: localhost  # 主节点地址
  master_port: 29500     # 主节点端口

# Mooncake store配置
mooncake:
  store_ip: localhost    # Mooncake store IP地址
  port_start: 12345      # 端口起始值，每个rank会在这个基础上递增
  metadata_url: http://localhost:8080/metadata  # 元数据服务地址
  grpc_url: localhost:50051  # gRPC服务地址
