# Pre-commit hooks configuration for Hixl
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files
# Note: clang-format should already be available (installed via system packages)
# Exclusions: build artifacts, third_party, etc.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '^(build/|third_party/|scripts/package/)'
      - id: end-of-file-fixer
        exclude: '^(build/|third_party/|scripts/package/)'
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [ '--maxkb=1024' ]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff-check
        args: [ --fix ]
        exclude: '^(build/|third_party/|tests/|examples/|benchmarks/|scripts/package/)'
      - id: ruff-format
        exclude: '^(build/|third_party/|tests/|examples/|benchmarks/|scripts/package/)'

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        exclude: '^(build/|third_party/|scripts/package/)'
        args: [ '--ignore-words-list=CANN,cann,alog',
                '--skip', '*.txt'
        ]

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v22.1.0
    hooks:
      - id: clang-format
        files: '\.(c|cc|cpp|cxx|h|hpp)$'
        exclude: '^(build/|third_party/|scripts/package/)'
